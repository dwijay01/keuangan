server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression for Performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve React SPA Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pass API and Sanctum Authentication logic directly to Laravel PHP-FPM Backend
    location ~ ^/(api|sanctum) {
        # Define FastCGI params specifically for Laravel's index.php
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
        
        # Increase timeout just in case of complex database logic
        fastcgi_read_timeout 300;
    }
}
